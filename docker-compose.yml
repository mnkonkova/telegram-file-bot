services:
  bot:
    build:
      context: .
      network: host
    network_mode: host
    env_file: .env
    volumes:
      - bot_storage:/app/storage
      - bot_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "bot.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  bot_storage:
  bot_data:
